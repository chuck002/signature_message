<!-- verify-wallet.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Verificar Wallet - Daily Sol</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { margin: 10px 5px; padding: 8px 16px; }
    #status { margin: 10px 0; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Verificar propiedad de wallet</h2>
  <p id="status">Cargando...</p>
  <button id="connect" style="display:none">Conectar Wallet</button>
  <button id="sign" style="display:none">Firmar Mensaje</button>

  <script type="module">
    // ✅ Importa desde Skypack SIN espacios
    import { PhantomWalletAdapter } from 'https://cdn.skypack.dev/@solana/wallet-adapter-phantom@0.9.23';
    
    // Obtiene parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const nonce = urlParams.get('nonce');
    const chatId = urlParams.get('chat_id');
    const backendUrl = 'https://d041-181-169-169-198.ngrok-free.app/verify-signature';

    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connect');
    const signBtn = document.getElementById('sign');

    if (!nonce || !chatId) {
      statusEl.innerText = '❌ Faltan parámetros (nonce o chat_id).';
      throw new Error('Missing URL params');
    }

    let provider = null;

    async function connect() {
      try {
        provider = new PhantomWalletAdapter();
        await provider.connect();
        statusEl.innerText = `✅ Conectado: ${provider.publicKey.toBase58()}`;
        signBtn.style.display = 'inline-block';
      } catch (err) {
        console.error('Error al conectar:', err);
        statusEl.innerText = '❌ Error al conectar wallet.';
      }
    }

    async function signMessage() {
      if (!provider?.publicKey) {
        statusEl.innerText = '⚠️ No hay wallet conectada.';
        return;
      }

      try {
        const message = new TextEncoder().encode(nonce);
        const signature = await provider.signMessage(message, 'utf8');
        const sigBase64 = btoa(String.fromCharCode(...new Uint8Array(signature)));

        statusEl.innerText = 'Enviando firma...';

        const res = await fetch(backendUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: chatId,
            wallet_address: provider.publicKey.toBase58(),
            nonce: nonce,
            signature: sigBase64
          })
        });

        if (res.ok) {
          statusEl.innerText = '✅ ¡Firma verificada! Vuelve a Telegram.';
        } else {
          const err = await res.json().catch(() => ({}));
          statusEl.innerText = '❌ Error: ' + (err.detail || 'falló la verificación');
        }
      } catch (err) {
        console.error('Error al firmar:', err);
        statusEl.innerText = '❌ Error al firmar mensaje.';
      }
    }

    // Inicializar UI
    connectBtn.addEventListener('click', connect);
    signBtn.addEventListener('click', signMessage);
    connectBtn.style.display = 'inline-block';
    statusEl.innerText = 'Listo para conectar.';
  </script>
</body>
</html>
